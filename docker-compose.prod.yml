version: "3.9"

# Production: pull from GHCR, persistent volumes, no local build
services:
  moso:
    image: ghcr.io/project-moso-ai/moso:latest
    container_name: moso
    restart: always
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      MOSO_HOME: /data/moso
      MOSO_MODEL_PATH: /models
      MOSO_N_CTX: "4096"
      LOG_LEVEL: warning
    volumes:
      - moso-data:/data/moso
      - moso-models:/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - moso-network
    deploy:
      resources:
        limits:
          memory: 8G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  moso-data:
    driver: local
  moso-models:
    driver: local

networks:
  moso-network:
    driver: bridge
